name: Rebuild WASM demos

on:
  # Déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:
    inputs:
      rs_grid_ref:
        description: 'Branche / tag / SHA rs-grid à builder'
        default: 'main'
        required: false

  # Déclenchement depuis rs-grid via repository_dispatch
  # Dans rs-grid : curl -X POST .../dispatches -d '{"event_type":"rs-grid-released","client_payload":{"ref":"v1.2.3"}}'
  repository_dispatch:
    types: [rs-grid-released]

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ruxelion-site
        uses: actions/checkout@v4

      - name: Checkout rs-grid
        uses: actions/checkout@v4
        with:
          repository: ruxelion/rs-grid
          ref: ${{ github.event.inputs.rs_grid_ref || github.event.client_payload.ref || 'main' }}
          path: rs-grid

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & bins
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-demos-${{ hashFiles('rs-grid/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-demos-

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack &> /dev/null; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi

      - name: Install trunk
        run: |
          if ! command -v trunk &> /dev/null; then
            cargo install --locked trunk
          fi

      - name: Rebuild demos
        run: bash scripts/update-wasm-demo.sh rs-grid

      - name: Commit & push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/public/wasm docs/public/demos
          git diff --staged --quiet && echo "Rien à commiter" && exit 0
          git commit -m "chore: rebuild WASM demos from rs-grid@${{ github.event.inputs.rs_grid_ref || github.event.client_payload.ref || 'main' }}"
          git remote set-url origin https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/${{ github.repository }}
          git push
